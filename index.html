<!DOCTYPE html>
<html>
<head>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
</head>
<body>
  <a-scene>
    <a-assets>
      <!-- Dream House Model -->
      <a-asset-item id="villaModel" src="3d-models/villa.glb"></a-asset-item>

      <!-- Ground Texture -->
      <img id="groundTexture" src="textures-images/ground.jpg">

    </a-assets>

    <!-- Sky -->
    <a-sky color="#87CEEB"></a-sky>
    
    <!-- Ground -->
    <a-plane 
      src="#groundTexture" 
      rotation="-90 0 0" 
      width="100" 
      height="100" 
      repeat="10 10"
      position="0 0 0">
    </a-plane>
    
    <a-entity gltf-model="#villaModel" position=" -150 -60 10" class="interactive" teleport-spot="target: -6 1.6 -17; label: Pool"
    float="speed:1;amp:0.15"></a-entity>
    
    <!-- Camera with movement controls -->
    <a-entity 
      camera 
      look-controls 
      wasd-controls 
      position="0 1.6 15">
    </a-entity>

  </a-scene>
</body>
</html>
