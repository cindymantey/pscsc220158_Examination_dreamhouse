<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VR Villa Experience</title>
  <!-- Core A-Frame library -->
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }
    #ui {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 1000;
      background: rgba(0, 0, 0, 0.7);
      color: white;
      padding: 15px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
    }
    #ui.visible {
      display: block;
    }
    .ui-button {
      background: #4CAF50;
      color: white;
      border: none;
      padding: 8px 16px;
      margin: 5px;
      border-radius: 4px;
      cursor: pointer;
    }
    .ui-button:hover {
      background: #45a049;
    }
  </style>
</head>
<body>
  <div id="ui">
    <h3>VR Controls</h3>
    <p><strong>Desktop:</strong> Click and drag to look, WASD to move</p>
    <p><strong>VR:</strong> Use controllers for teleportation and movement</p>
    <button class="ui-button" onclick="toggleUI()">Hide Instructions</button>
  </div>
  
  <a-scene 
    vr-mode-ui="enabled: true"
    background="color: #87CEEB"
    stats>
    <a-assets>
      <!-- Dream House Model -->
      <a-asset-item id="villaModel" src="3d models/villa.glb" preload="true"></a-asset-item>

      <!-- Ground Texture with optimization -->
      <img id="groundTexture" src="textures/ground.jpg" crossorigin="anonymous">
    </a-assets>

    <!-- Sky -->
    <a-sky color="#87CEEB"></a-sky>
    
    <!-- Ground with optimized texture settings -->
    <a-plane 
      src="#groundTexture" 
      rotation="-90 0 0" 
      width="100" 
      height="100" 
      repeat="10 10"
      position="0 0 0"
      material="shader: standard; roughness: 0.8; metalness: 0.1"
      shadow="receive: true">
    </a-plane>
    
    <!-- Villa Model with optimized settings -->
    <a-entity 
      gltf-model="#villaModel" 
      position="-150 -60 -10"
      shadow="cast: true; receive: true">
    </a-entity>
    
    <!-- VR Camera Rig with teleportation and movement -->
    <a-entity id="rig">
      <!-- Camera with VR-optimized controls -->
      <a-entity 
        id="camera"
        camera="fov: 80; near: 0.1; far: 1000"
        look-controls="pointerLockEnabled: true; touchEnabled: true"
        wasd-controls="acceleration: 20; adEnabled: true; enabled: true"
        position="0 1.6 15">
        
        <!-- Right hand controller with teleportation (custom) -->
        <a-entity 
          hand-controls="hand: right"
          simple-teleport
          laser-controls="hand: right"
          raycaster="objects: a-plane; 
                    far: 100; interval: 0; lineColor: #118A7E; 
                    lineOpacity: 0.8; showLine: true">
        </a-entity>
        
        <!-- Left hand controller for interactions -->
        <a-entity 
          hand-controls="hand: left"
          laser-controls="hand: left"
          raycaster="objects: [data-raycastable]; far: 100">
        </a-entity>
      </a-entity>
    </a-entity>
    
    <!-- Optimized lighting setup -->
    <a-light 
      type="ambient" 
      intensity="0.6" 
      color="#FFFFFF">
    </a-light>
    
    <a-light 
      type="directional" 
      position="5 10 5" 
      intensity="0.9"
      color="#FFFFFF"
      cast-shadow="true"
      shadow-map-width="2048"
      shadow-map-height="2048"
      shadow-camera-left="-50"
      shadow-camera-right="50"
      shadow-camera-top="50"
      shadow-camera-bottom="-50">
    </a-light>
    
    <!-- Additional fill light for better visibility -->
    <a-light 
      type="hemisphere" 
      color="#87CEEB" 
      groundColor="#8B7355" 
      intensity="0.4">
    </a-light>
    
    <!-- Teleportation targets (optional waypoints) -->
    <a-circle 
      data-raycastable
      position="0 0.1 0" 
      radius="2" 
      color="#118A7E" 
      opacity="0.3"
      rotation="-90 0 0">
    </a-circle>
    
    <!-- Performance monitoring (visible in VR mode) -->
    <a-entity 
      text="value: Performance Mode: Optimized; align: center; 
            width: 4; color: white; zOffset: 0.01"
      position="0 2.5 -1"
      visible="false">
    </a-entity>
  </a-scene>
  
  <script>
    // Custom teleportation component (fallback)
    AFRAME.registerComponent('simple-teleport', {
      init: function () {
        this.rig = document.querySelector('#rig');
        this.camera = document.querySelector('#camera');

        this.el.addEventListener('triggerdown', () => {
          const raycaster = this.el.components.raycaster;
          if (!raycaster || !raycaster.intersections || !raycaster.intersections.length) {
            return;
          }

          const intersection = raycaster.intersections[0];
          if (intersection && intersection.object && intersection.object.el && intersection.object.el.tagName === 'A-PLANE') {
            const point = intersection.point;
            const newPosition = { x: point.x, y: this.camera.getAttribute('position').y, z: point.z };
            this.rig.setAttribute('position', newPosition);
          }
        });
      }
    });
    
    // UI toggle function
    function toggleUI() {
      const ui = document.getElementById('ui');
      ui.classList.toggle('visible');
    }
    
    // Show UI initially
    document.addEventListener('DOMContentLoaded', function() {
      document.getElementById('ui').classList.add('visible');
      setTimeout(() => {
        document.getElementById('ui').classList.remove('visible');
      }, 5000);
    });
  </script>
</body>
</html>
