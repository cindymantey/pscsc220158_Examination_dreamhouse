<!DOCTYPE html>
<html>
<head>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
</head>
<body>
  <a-scene>
    <a-assets>
      <!-- Dream House Model -->
      <a-asset-item id="villaModel" src="3d models/villa.glb"></a-asset-item>

      <!-- Ground Texture -->
      <img id="groundTexture" src="textures/ground.jpg">
    </a-assets>

    <!-- Sky -->
    <a-sky color="#87CEEB"></a-sky>
    
    <!-- Ground -->
    <a-plane 
      src="#groundTexture" 
      rotation="-90 0 0" 
      width="100" 
      height="100" 
      repeat="10 10"
      position="0 0 0">
    </a-plane>
    
    <a-entity gltf-model="#villaModel" position="0 -60 -10" ></a-entity>
    
    <!-- Camera with movement controls -->
    <a-entity 
      camera 
      look-controls 
      wasd-controls 
      position="0 1.6 15">
    </a-entity>
    
    <!-- lights -->
    <a-light type="ambient" intensity="0.5"></a-light>
    <a-light type="directional" position="5 10 5" intensity="0.8"></a-light>
  </a-scene>
</body>
</html>
