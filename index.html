<!DOCTYPE html>
<html>
<head>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
</head>
<body>
  <a-scene>
    <a-assets>
      <!-- Dream House Model with Sky -->
      <a-asset-item id="DreamHouseModel" src="3d models/DreamHouse.glb"></a-asset-item>
    </a-assets>

    <a-entity gltf-model="#DreamHouseModel" position="0 0 0"></a-entity>
    
    <!-- Camera with movement controls -->
    <a-entity 
      camera 
      look-controls 
      wasd-controls 
      position="0 1.6 5">
    </a-entity>
    
    <!-- lights -->
    <a-light type="ambient" intensity="0.5"></a-light>
    <a-light type="directional" position="5 10 5" intensity="0.8"></a-light>
  </a-scene>
</body>
</html>
