<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A-Frame Scene</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aframe-text-geometry-component@1.1.0/dist/aframe-text-geometry-component.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component/dist/aframe-environment-component.min.js"></script>
</head>
<body>
    <a-scene>
        <!-- Camera -->
        <a-camera position="0 1.6 0" look-controls="enabled: true"></a-camera>

        <!-- Lighting -->
        <a-light type="ambient" color="#404040"></a-light>
        <a-light type="directional" position="0 1 1" intensity="0.5"></a-light>

        <!-- Ground -->
        <a-plane 
            rotation="-90 0 0" 
            width="10" 
            height="10" 
            color="#7BC8A4"
            position="0 0 0">
        </a-plane>      
        <!-- Sky -->
        <a-assets>
            <a-entity environment="preset: default; skyType: atmosphere; skyColor: #88c2f7"></a-entity>
          </a-assets>
        
    </a-scene>
</body>
</html>
