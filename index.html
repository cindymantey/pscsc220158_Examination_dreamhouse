<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VR Villa Experience</title>
  <!-- Core A-Frame library (must load before any extras/components) -->
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; }
    #ui {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 1000;
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 15px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
    }
    #ui.visible { display: block; }
    .ui-button {
      background: #4CAF50;
      color: white;
      border: none;
      padding: 8px 16px;
      margin: 5px;
      border-radius: 4px;
      cursor: pointer;
    }
    .ui-button:hover { background: #45a049; }
  </style>
</head>
<body>
  <div id="ui">
    <h3>VR Controls</h3>
    <p><strong>Desktop:</strong> Click and drag to look, WASD to move</p>
    <p><strong>VR:</strong> Use controllers to look around and move</p>
    <button class="ui-button" onclick="toggleUI()">Hide Instructions</button>
  </div>

  <a-scene
    vr-mode-ui="enabled: true"
    renderer="antialias: true; colorManagement: true; physicallyCorrectLights: true"
    background="color: #87CEEB"
    embedded>

    <a-assets timeout="10000">
      <a-asset-item id="villaModel" src="3d-models/villa.glb"></a-asset-item>
      <img id="groundTexture" src="textures/ground.jpg" crossorigin="anonymous">
    </a-assets>

    <!-- Sky -->
    <a-sky color="#87CEEB"></a-sky>

    <!-- Ground -->
    <a-plane
      src="#groundTexture"
      rotation="-90 0 0"
      width="200"
      height="200"
      repeat="10 10"
      position="0 0 0"
      material="shader: standard; roughness: 0.8; metalness: 0.1">
    </a-plane>

    <!-- Villa Model -->
    <a-entity
      gltf-model="#villaModel"
      position="0 0 -10"
      scale="0.01 0.01 0.01"
      shadow="cast: true; receive: true">
    </a-entity>

    <!-- Camera Rig for VR movement -->
    <a-entity id="rig" position="0 0 0">
      <a-entity
        id="camera"
        camera="fov: 80; near: 0.1; far: 1000"
        look-controls="pointerLockEnabled: true; touchEnabled: true"
        position="0 1.6 15">
      </a-entity>

      <!-- Right hand controller -->
      <a-entity
        hand-controls="hand: right; handModelStyle: lowPoly; color: #ffcccc"
        laser-controls="hand: right"
        raycaster="far: 100; lineColor: #118A7E; lineOpacity: 0.8; showLine: true">
      </a-entity>

      <!-- Left hand controller -->
      <a-entity
        hand-controls="hand: left; handModelStyle: lowPoly; color: #ffcccc"
        laser-controls="hand: left"
        raycaster="far: 100; showLine: false">
      </a-entity>
    </a-entity>

    <!-- Lighting -->
    <a-light type="ambient" intensity="0.6" color="#FFFFFF"></a-light>
    <a-light type="directional" position="5 10 5" intensity="0.9" color="#FFFFFF"></a-light>
    <a-light type="hemisphere" color="#87CEEB" groundColor="#8B7355" intensity="0.4"></a-light>

  </a-scene>

  <script>
    function toggleUI() {
      document.getElementById('ui').classList.toggle('visible');
    }

    document.addEventListener('DOMContentLoaded', function() {
      document.getElementById('ui').classList.add('visible');
      setTimeout(() => {
        document.getElementById('ui').classList.remove('visible');
      }, 5000);
    });

    const scene = document.querySelector('a-scene');

    scene.addEventListener('enter-vr', function() {
      const renderer = scene.renderer;
      if (renderer) {
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
      }
    });

    // Adjust villa position after model loads if needed
    scene.addEventListener('loaded', function() {
      console.log('Scene loaded successfully');
    });
  </script>
</body>
</html>
