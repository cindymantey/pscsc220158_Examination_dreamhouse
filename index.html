<!DOCTYPE html>
<html>
<head>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-water-component/dist/aframe-water-component.min.js"></script>
</head>
<body>
 
  <a-scene>
    <a-assets>
      <!-- Dream House Model -->
      <a-asset-item id="villaModel" src="3d-models/villa.glb"></a-asset-item>

      <!-- Ground Texture -->
      <img id="groundTexture" src="textures-images/ground.jpg">

    </a-assets>

    <!-- Sky -->
    <a-sky color="#87CEEB"></a-sky>
    
    <!-- Ground -->
    <a-plane 
      src="#groundTexture" 
      rotation="-90 0 0" 
      width="100" 
      height="100" 
      repeat="10 10"
      position="0 0 0">
    </a-plane>
    
    <a-entity gltf-model="#villaModel" position="-15 -5 15" scale="0.1 0.1 0.1" class="interactive" teleport-spot="target: -6 1.6 -17; label: Pool"
    float="speed:1;amp:0.15"></a-entity>

    <!-- Swimming Pool water-->
    <a-plane
    position="7 1 -2"
    scale="0.7 0.7 0.7"
    rotation="-90 0 0"
    width="7"
    height="7"
    color="#006994"
    opacity="0.8"
    transparent="true">
  </a-plane>
  <!-- Animate color to simulate shimmer -->
  <a-animation
    attribute="color"
    from="#00aaff"
    to="#0077cc"
    direction="alternate"
    dur="2000"
    repeat="indefinite">
  </a-animation>

  <!-- Animate opacity to simulate ripple depth -->
  <a-animation
    attribute="opacity"
    from="0.6"
    to="0.85"
    direction="alternate"
    dur="1500"
    repeat="indefinite">
  </a-animation>

    
    <!-- Camera with movement controls -->
    <a-entity 
      camera 
      look-controls 
      wasd-controls 
      position="0 1.6 15">
    </a-entity>

  </a-scene>
</body>
</html>
